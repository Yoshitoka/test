name: Sync draw.io to Confluence (Stable Final)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - 'drawio.xml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      # =========================================
      # CHECKOUT
      # =========================================
      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      # =========================================
      # VALIDATE XML
      # =========================================
      - name: 📥 Validate XML
        run: |
          if [ ! -f drawio.xml ]; then
            echo "::error::drawio.xml not found"
            exit 1
          fi

          if ! grep -q "<mxfile" drawio.xml; then
            echo "::error::Invalid XML"
            exit 1
          fi

      # =========================================
      # FETCH PAGE
      # =========================================
      - name: 📄 Fetch Confluence metadata
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=version,title"

          HTTP_STATUS=$(curl -s -o page.json -w "%{http_code}" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            "$URL")

          echo "Status: $HTTP_STATUS"
          cat page.json

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Fetch failed"
            exit 1
          fi

          CURRENT_VERSION=$(jq '.version.number' page.json)
          TITLE=$(jq -r '.title' page.json)

          NEXT_VERSION=$((CURRENT_VERSION + 1))

          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          echo "TITLE=$TITLE" >> $GITHUB_ENV

      # =========================================
      # UPDATE PAGE (SAFE JSON via jq)
      # =========================================
      - name: 🚀 Update Confluence page
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
          TITLE: ${{ env.TITLE }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          echo "Building macro..."

          XML=$(cat drawio.xml)

          MACRO="<ac:structured-macro ac:name=\"drawio\">
  <ac:parameter ac:name=\"diagramName\">Auto Diagram</ac:parameter>
  <ac:parameter ac:name=\"contentType\">application/xml</ac:parameter>
  <ac:plain-text-body><![CDATA[$XML]]></ac:plain-text-body>
</ac:structured-macro>"

          echo "Building JSON payload with jq..."

          jq -n \
            --arg id "$PAGE_ID" \
            --arg title "$TITLE" \
            --arg macro "$MACRO" \
            --argjson version "$NEXT_VERSION" \
            '{
              id: $id,
              type: "page",
              title: $title,
              version: { number: $version },
              body: {
                storage: {
                  value: $macro,
                  representation: "storage"
                }
              }
            }' > body.json

          echo "::group::Payload preview"
          cat body.json
          echo "::endgroup::"

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID"

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X PUT "$URL" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d @body.json)

          echo "Status: $HTTP_STATUS"

          echo "::group::API RESPONSE"
          cat response.json
          echo "::endgroup::"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Update failed"
            exit 1
          fi

          echo "✅ Update successful"
