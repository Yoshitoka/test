name: Sync draw.io to Confluence (Full Debug + Versioning)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - 'drawio.xml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      # =========================================
      # CHECKOUT
      # =========================================
      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      # =========================================
      # CONTEXT DEBUG
      # =========================================
      - name: 🔍 Debug context
        run: |
          echo "::group::GitHub Context"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF"
          echo "Actor: $GITHUB_ACTOR"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Commit: $GITHUB_SHA"
          echo "::endgroup::"

      # =========================================
      # XML VALIDATION
      # =========================================
      - name: 📥 Validate XML
        run: |
          set -x

          echo "::group::XML Validation"

          if [ ! -f drawio.xml ]; then
            echo "::error::drawio.xml not found"
            exit 1
          fi

          SIZE=$(wc -c < drawio.xml)
          echo "File size: $SIZE bytes"

          if [ "$SIZE" -lt 50 ]; then
            echo "::error::XML file too small"
            exit 1
          fi

          if ! grep -q "<mxfile" drawio.xml; then
            echo "::error::Invalid XML (missing <mxfile>)"
            exit 1
          fi

          echo "✅ XML looks valid"

          echo "::group::Preview (first lines)"
          head -20 drawio.xml
          echo "::endgroup::"

          echo "::endgroup::"

      # =========================================
      # FETCH PAGE
      # =========================================
      - name: 📄 Fetch Confluence metadata
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          set -x

          echo "::group::Fetching page"

          RESPONSE=$(curl -s \
            -H "Authorization: Basic $(echo -n "$USER:$TOKEN" | base64)" \
            "$BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=version,title")

          echo "$RESPONSE" > page.json

          if [ -z "$RESPONSE" ]; then
            echo "::error::Empty response from Confluence"
            exit 1
          fi

          echo "::group::Raw response"
          cat page.json
          echo "::endgroup::"

          CURRENT_VERSION=$(jq '.version.number' page.json)
          TITLE=$(jq -r '.title' page.json)

          if [ "$CURRENT_VERSION" = "null" ] || [ -z "$TITLE" ]; then
            echo "::error::Failed to parse page metadata"
            exit 1
          fi

          NEXT_VERSION=$((CURRENT_VERSION + 1))

          echo "Current version: $CURRENT_VERSION"
          echo "Next version: $NEXT_VERSION"
          echo "Title: $TITLE"

          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          echo "TITLE=$TITLE" >> $GITHUB_ENV

          echo "::endgroup::"

      # =========================================
      # UPDATE PAGE
      # =========================================
      - name: 🚀 Update Confluence
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
          TITLE: ${{ env.TITLE }}
        run: |
          set -x

          echo "::group::Preparing payload"

          # ✅ Escape XML for JSON
          XML_ESCAPED=$(sed ':a;N;$!ba;s/\n/\\n/g' drawio.xml | sed 's/"/\\"/g')

          BODY=$(cat <<EOF
          {
            "id": "$PAGE_ID",
            "type": "page",
            "title": "$TITLE",
            "version": { "number": $NEXT_VERSION },
            "body": {
              "storage": {
                "value": "<ac:structured-macro ac:name=\"drawio\"><ac:plain-text-body><![CDATA[$XML_ESCAPED]]></ac:plain-text-body></ac:structured-macro>",
                "representation": "storage"
              }
            }
          }
          EOF
          )

          echo "::group::Payload preview"
          echo "$BODY" | head -50
          echo "::endgroup::"

          echo "::endgroup::"

          echo "::group::Calling Confluence API"

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X PUT "$BASE_URL/rest/api/content/$PAGE_ID" \
            -H "Authorization: Basic $(echo -n "$USER:$TOKEN" | base64)" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "HTTP Status: $HTTP_STATUS"

          echo "::group::API RESPONSE"
          cat response.json
          echo "::endgroup::"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Confluence update failed"
            exit 1
          fi

          echo "✅ Update successful"

          echo "::endgroup::"

      # =========================================
      # COMPLETE
      # =========================================
      - name: ✅ Done
        run: |
          echo "🎉 Workflow finished successfully"
