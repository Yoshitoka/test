name: Sync draw.io to Confluence (Final Working - custContentId)

on:
  push:
    paths:
      - 'drawio.drawio'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      # =========================================
      # CHECKOUT
      # =========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================
      # VALIDATE FILE
      # =========================================
      - name: Validate draw.io file
        run: |
          if [ ! -f drawio.drawio ]; then
            echo "ERROR: drawio.drawio not found"
            exit 1
          fi

          if ! grep -q "<mxfile" drawio.drawio; then
            echo "ERROR: Invalid draw.io file"
            exit 1
          fi

      # =========================================
      # FETCH PAGE INFO
      # =========================================
      - name: Fetch page info
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}   # zonder /wiki
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=version,title"

          curl -s -H "Authorization: Basic $AUTH" "$URL" > page.json

          CURRENT_VERSION=$(jq '.version.number' page.json)
          TITLE=$(jq -r '.title' page.json)

          NEXT_VERSION=$((CURRENT_VERSION + 1))

          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          echo "TITLE=$TITLE" >> $GITHUB_ENV

      # =========================================
      # UPLOAD ATTACHMENT
      # =========================================
      - name: Upload draw.io attachment
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID/child/attachment"

          echo "Uploading drawio.drawio..."

          curl -X POST "$URL" \
            -H "Authorization: Basic $AUTH" \
            -H "X-Atlassian-Token: nocheck" \
            -F 'file=@drawio.drawio;type=application/vnd.jgraph.mxfile' \
            -F 'minorEdit=true'

          echo "✅ Upload complete"

      # =========================================
      # GET ATTACHMENT INFO
      # =========================================
      - name: Get attachment info
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID/child/attachment?filename=drawio.drawio"

          curl -s -H "Authorization: Basic $AUTH" "$URL" > attach.json

          ATTACH_ID=$(jq -r '.results[0].id' attach.json)
          FILE_ID=$(jq -r '.results[0].extensions.fileId' attach.json)

          if [ -z "$FILE_ID" ] || [ "$FILE_ID" = "null" ]; then
            echo "ERROR: fileId (custContentId) not found"
            cat attach.json
            exit 1
          fi

          echo "ATTACH_ID=$ATTACH_ID" >> $GITHUB_ENV
          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV

      # =========================================
      # UPDATE PAGE WITH CORRECT MACRO
      # =========================================
      - name: Update Confluence page
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
          TITLE: ${{ env.TITLE }}
          FILE_ID: ${{ env.FILE_ID }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          # ✅ CRUCIALE macro (met custContentId)
          MACRO="<ac:structured-macro ac:name=\"drawio\" ac:schema-version=\"1\" data-layout=\"default\">"
          MACRO="<ac:parameter ac:name=\"pageId\">$PAGE_ID</ac:parameter>"
          MACRO="<ac:parameter ac:name=\"diagramName\">drawio.drawio</ac:parameter>"
          MACRO="<ac:parameter ac:name=\"custContentId\">$FILE_ID</ac:parameter>"
          MACRO="<ac:parameter ac:name=\"contentVer\">1</ac:parameter>"
          MACRO="<ac:parameter ac:name=\"revision\">1</ac:parameter>"
          MACRO="<ac:parameter ac:name=\"width\">800</ac:parameter>"
          MACRO="<ac:parameter ac:name=\"height\">600</ac:parameter>"
          MACRO="</ac:structured-macro>"

          echo "Macro preview:"
          echo "$MACRO"

          jq -n \
            --arg id "$PAGE_ID" \
            --arg title "$TITLE" \
            --arg macro "$MACRO" \
            --argjson version "$NEXT_VERSION" \
            '{
              id: $id,
              type: "page",
              title: $title,
              version: { number: $version },
              body: {
                storage: {
                  value: $macro,
                  representation: "storage"
                }
              }
            }' > body.json

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID"

          STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X PUT "$URL" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d @body.json)

          echo "HTTP Status: $STATUS"
          cat response.json

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: update failed"
            exit 1
          fi

          echo "✅ Diagram succesvol weergegeven in Confluence"
