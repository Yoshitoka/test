name: Sync draw.io to Confluence (Attachment Mode)

on:
  push:
    paths:
      - 'drawio.xml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      # =========================================
      # CHECKOUT
      # =========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================
      # VALIDATE XML
      # =========================================
      - name: Validate XML
        run: |
          if [ ! -f drawio.xml ]; then
            echo "ERROR: drawio.xml not found"
            exit 1
          fi

          if ! grep -q "<mxfile" drawio.xml; then
            echo "ERROR: Invalid XML"
            exit 1
          fi

      # =========================================
      # GET VERSION
      # =========================================
      - name: Get Confluence page info
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=version,title"

          curl -s -H "Authorization: Basic $AUTH" "$URL" > page.json

          CURRENT_VERSION=$(jq '.version.number' page.json)
          TITLE=$(jq -r '.title' page.json)

          NEXT_VERSION=$((CURRENT_VERSION + 1))

          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          echo "TITLE=$TITLE" >> $GITHUB_ENV

      # =========================================
      # UPLOAD ATTACHMENT
      # =========================================
      - name: Upload draw.io attachment
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID/child/attachment"

          echo "Uploading attachment..."

          curl -s -X POST "$URL" \
            -H "Authorization: Basic $AUTH" \
            -H "X-Atlassian-Token: nocheck" \
            -F "file=@drawio.xml" \
            -F "minorEdit=true"

          echo "✅ Attachment uploaded"

      # =========================================
      # UPDATE PAGE WITH DRAW.IO MACRO
      # =========================================
      - name: Update page with draw.io macro
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
          TITLE: ${{ env.TITLE }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          echo "Building macro..."

          MACRO="<ac:structured-macro ac:name=\"drawio\">\
          MACRO="<ac:parameter ac:name=\"diagramName\">drawio.xml</ac:parameter>\
          MACRO="</ac:structured-macro>"

          jq -n \
            --arg id "$PAGE_ID" \
            --arg title "$TITLE" \
            --arg macro "$MACRO" \
            --argjson version "$NEXT_VERSION" \
            '{
              id: $id,
              type: "page",
              title: $title,
              version: { number: $version },
              body: {
                storage: {
                  value: $macro,
                  representation: "storage"
                }
              }
            }' > body.json

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID"

          STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X PUT "$URL" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d @body.json)

          echo "HTTP: $STATUS"
          cat response.json

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Page update failed"
            exit 1
          fi

          echo "✅ Page updated with draw.io macro"
