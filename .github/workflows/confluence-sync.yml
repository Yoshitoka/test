name: Sync draw.io to Confluence (Attachment Mode Final)

on:
  push:
    paths:
      - 'drawio.drawio'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      # =========================================
      # CHECKOUT
      # =========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================
      # VALIDATE FILE
      # =========================================
      - name: Validate draw.io file
        run: |
          if [ ! -f drawio.drawio ]; then
            echo "ERROR: drawio.drawio not found"
            exit 1
          fi

          if ! grep -q "<mxfile" drawio.drawio; then
            echo "ERROR: Invalid draw.io file"
            exit 1
          fi

      # =========================================
      # FETCH PAGE INFO
      # =========================================
      - name: Fetch Confluence metadata
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}   # zonder /wiki
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=version,title"

          curl -s -H "Authorization: Basic $AUTH" "$URL" > page.json

          CURRENT_VERSION=$(jq '.version.number' page.json)
          TITLE=$(jq -r '.title' page.json)

          NEXT_VERSION=$((CURRENT_VERSION + 1))

          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          echo "TITLE=$TITLE" >> $GITHUB_ENV

      # =========================================
      # DELETE EXISTING ATTACHMENT (OPTIONEEL MAAR AANRADER)
      # =========================================
      - name: Delete old attachment (if exists)
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          ATTACH_URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID/child/attachment?filename=drawio.drawio"

          curl -s -H "Authorization: Basic $AUTH" "$ATTACH_URL" > attachments.json

          ATTACH_ID=$(jq -r '.results[0].id // empty' attachments.json)

          if [ ! -z "$ATTACH_ID" ]; then
            echo "Deleting old attachment: $ATTACH_ID"

            curl -s -X DELETE \
              -H "Authorization: Basic $AUTH" \
              "$BASE_URL/wiki/rest/api/content/$ATTACH_ID"
          else
            echo "No existing attachment found"
          fi

      # =========================================
      # UPLOAD ATTACHMENT
      # =========================================
      - name: Upload draw.io attachment
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID/child/attachment"

          curl -s -X POST "$URL" \
            -H "Authorization: Basic $AUTH" \
            -H "X-Atlassian-Token: nocheck" \
            -F "file=@drawio.drawio" \
            -F "minorEdit=true"

          echo "✅ Attachment uploaded"

      # =========================================
      # UPDATE PAGE WITH DRAW.IO MACRO
      # =========================================
      - name: Update page with draw.io macro
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
          TITLE: ${{ env.TITLE }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          MACRO='<ac:structured-macro ac:name="diagrams.net">'
          MACRO='<ac:parameter ac:name="diagramName">drawio.drawio</ac:parameter>'
          MACRO='</ac:structured-macro>'

          jq -n \
            --arg id "$PAGE_ID" \
            --arg title "$TITLE" \
            --arg macro "$MACRO" \
            --argjson version "$NEXT_VERSION" \
            '{
              id: $id,
              type: "page",
              title: $title,
              version: { number: $version },
              body: {
                storage: {
                  value: $macro,
                  representation: "storage"
                }
              }
            }' > body.json

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID"

          STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X PUT "$URL" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d @body.json)

          echo "HTTP: $STATUS"
          cat response.json

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Page update failed"
            exit 1
          fi

          echo "✅ Page updated with draw.io macro"
