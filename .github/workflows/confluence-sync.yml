name: Sync draw.io to Confluence (Final Working)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - 'drawio.xml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      # =========================================
      # CHECKOUT
      # =========================================
      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      # =========================================
      # DEBUG CONTEXT
      # =========================================
      - name: 🔍 Debug context
        run: |
          echo "::group::GitHub Context"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF"
          echo "Actor: $GITHUB_ACTOR"
          echo "::endgroup::"

      # =========================================
      # VALIDATE XML
      # =========================================
      - name: 📥 Validate XML
        run: |
          set -e
          echo "::group::XML validation"

          if [ ! -f drawio.xml ]; then
            echo "::error::drawio.xml not found"
            exit 1
          fi

          SIZE=$(wc -c < drawio.xml)
          echo "File size: $SIZE"

          if ! grep -q "<mxfile" drawio.xml; then
            echo "::error::Invalid XML (missing <mxfile>)"
            exit 1
          fi

          echo "✅ XML is valid"
          echo "::endgroup::"

      # =========================================
      # FETCH CONFLUENCE PAGE
      # =========================================
      - name: 📄 Fetch Confluence metadata
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          set -e

          echo "::group::Fetch Confluence page"

          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          # ✅ BELANGRIJK:
          # Als BASE_URL = https://xxx.atlassian.net/wiki
          # gebruik /rest/api
          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=version,title"

          echo "Calling URL:"
          echo "$URL"

          HTTP_STATUS=$(curl -s -o page.json -w "%{http_code}" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            "$URL")

          echo "Status: $HTTP_STATUS"

          echo "::group::Response"
          cat page.json
          echo "::endgroup::"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Failed to fetch page metadata"
            exit 1
          fi

          CURRENT_VERSION=$(jq '.version.number' page.json)
          TITLE=$(jq -r '.title' page.json)

          NEXT_VERSION=$((CURRENT_VERSION + 1))

          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          echo "TITLE=$TITLE" >> $GITHUB_ENV

          echo "::endgroup::"

      # =========================================
      # UPDATE PAGE
      # =========================================
      - name: 🚀 Update Confluence page
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
          TITLE: ${{ env.TITLE }}
        run: |
          set -e

          echo "::group::Update page"

          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          # ✅ Escape XML veilig
          XML_ESCAPED=$(sed 's/\r//g' drawio.xml | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')

          BODY=$(cat <<EOF
          {
            "id": "$PAGE_ID",
            "type": "page",
            "title": "$TITLE",
            "version": { "number": $NEXT_VERSION },
            "body": {
              "storage": {
              "value": "<ac:structured-macro ac:name=\"drawio\"><ac:parameter ac:name=\"diagramName\">Auto Diagram</ac:parameter><ac:plain-text-body><![CDATA[$XML_ESCAPED]]></ac:plain-text-body></ac:structured-macro>"
                "representation": "storage"
              }
            }
          }
          EOF
          )

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID"

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X PUT "$URL" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "Status: $HTTP_STATUS"

          echo "::group::API RESPONSE"
          cat response.json
          echo "::endgroup::"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Update failed"
            exit 1
          fi

          echo "✅ Update successful"
          echo "::endgroup::"

      # =========================================
      # DONE
      # =========================================
      - name: ✅ Done
        run: echo "🎉 Done!"
