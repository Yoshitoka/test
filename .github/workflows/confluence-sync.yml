name: Sync draw.io to Confluence (Final Fixed)

on:
  push:
    paths:
      - 'drawio.xml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      # Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # Validate XML
      - name: Validate XML
        run: |
          if [ ! -f drawio.xml ]; then
            echo "ERROR: drawio.xml not found"
            exit 1
          fi

          if ! grep -q "<mxfile" drawio.xml; then
            echo "ERROR: Invalid XML"
            exit 1
          fi

      # Fetch Confluence page
      - name: Fetch Confluence metadata
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}   # zonder /wiki
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=version,title"

          STATUS=$(curl -s -o page.json -w "%{http_code}" \
            -H "Authorization: Basic $AUTH" \
            "$URL")

          echo "HTTP: $STATUS"
          cat page.json

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Fetch failed"
            exit 1
          fi

          CURRENT_VERSION=$(jq '.version.number' page.json)
          TITLE=$(jq -r '.title' page.json)
          NEXT_VERSION=$((CURRENT_VERSION + 1))

          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          echo "TITLE=$TITLE" >> $GITHUB_ENV

      # Update Confluence
      - name: Update Confluence
        env:
          BASE_URL: ${{ secrets.CONFLUENCE_BASE }}   # zonder /wiki
          PAGE_ID: ${{ secrets.PAGE_ID }}
          USER: ${{ secrets.CONFLUENCE_USER }}
          TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          NEXT_VERSION: ${{ env.NEXT_VERSION }}
          TITLE: ${{ env.TITLE }}
        run: |
          AUTH=$(echo -n "$USER:$TOKEN" | base64 -w 0)

          XML=$(cat drawio.xml)

          # ✅ Build macro veilig (geen heredoc)
          MACRO="<ac:structured-macro ac:name=\"drawio\">"
          MACRO="${MACRO}<ac:parameter ac:name=\"diagramName\">Auto Diagram</ac:parameter>"
          MACRO="${MACRO}<ac:parameter ac:name=\"contentType\">application/xml</ac:parameter>"
          MACRO="${MACRO}<ac:plain-text-body><![CDATA[${XML}]]></ac:plain-text-body>"
          MACRO="${MACRO}</ac:structured-macro>"

          # ✅ JSON via jq (no parse errors)
          jq -n \
            --arg id "$PAGE_ID" \
            --arg title "$TITLE" \
            --arg macro "$MACRO" \
            --argjson version "$NEXT_VERSION" \
            '{
              id: $id,
              type: "page",
              title: $title,
              version: { number: $version },
              body: {
                storage: {
                  value: $macro,
                  representation: "storage"
                }
              }
            }' > body.json

          URL="$BASE_URL/wiki/rest/api/content/$PAGE_ID"

          STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X PUT "$URL" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d @body.json)

          echo "HTTP: $STATUS"
          cat response.json

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Update failed"
            exit 1
          fi

          echo "SUCCESS ✅"
